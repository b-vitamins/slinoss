name: release-wheel

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  TORCH_VERSION: "2.10.0"

jobs:
  build_pure:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      version: ${{ steps.meta.outputs.version }}
      wheel_name: ${{ steps.meta.outputs.wheel_name }}
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Read package metadata
        id: meta
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          version = data["project"]["version"]
          print(f"version={version}")
          print(f"wheel_name=slinoss-{version}-py3-none-any.whl")
          PY

      - name: Ensure tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: test "${GITHUB_REF_NAME}" = "v${{ steps.meta.outputs.version }}"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip "setuptools>=69" wheel build
          python -m pip install --upgrade \
            --index-url https://download.pytorch.org/whl/cpu \
            --extra-index-url https://pypi.org/simple \
            "torch==${TORCH_VERSION}"

      - name: Clean build artifacts
        run: |
          rm -rf build dist *.egg-info
          rm -rf slinoss/ops/v2x2ssd/cute/aot/artifacts
          rm -rf slinoss/ops/v2x2ssd/cute/aot/runtime
          rm -f slinoss/ops/v2x2ssd/cute/aot/manifest.json
          rm -rf slinoss/ops/scanprep/cute/aot/artifacts
          rm -rf slinoss/ops/scanprep/cute/aot/runtime
          rm -f slinoss/ops/scanprep/cute/aot/manifest.json

      - name: Build universal wheel
        env:
          SLINOSS_SKIP_CUDA_BUILD: "1"
        run: python -m build --wheel --no-isolation

      - name: Verify universal wheel output
        run: test -f "dist/${{ steps.meta.outputs.wheel_name }}"

      - name: Smoke install universal wheel
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m venv /tmp/slinoss-pure-wheel-smoke
          /tmp/slinoss-pure-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/slinoss-pure-wheel-smoke/bin/python -m pip install \
            --index-url https://download.pytorch.org/whl/cpu \
            --extra-index-url https://pypi.org/simple \
            "torch==${TORCH_VERSION}"
          /tmp/slinoss-pure-wheel-smoke/bin/python -m pip install "dist/${{ steps.meta.outputs.wheel_name }}"
          cd /tmp
          /tmp/slinoss-pure-wheel-smoke/bin/python - <<'PY'
          import torch
          from slinoss.layers import SLinOSSMixer

          mixer = SLinOSSMixer(
              d_model=32,
              d_state=32,
              expand=2,
              d_head=16,
              d_conv=4,
          )
          x = torch.randn(2, 8, 32)
          y = mixer(x)
          assert y.shape == (2, 8, 32)
          print("pure-wheel-smoke-ok", tuple(y.shape))
          PY

      - name: Upload universal wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: slinoss-pure-wheel-${{ steps.meta.outputs.version }}
          path: dist/${{ steps.meta.outputs.wheel_name }}

  build_cuda_aot_payload:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CUDA toolkit
        id: cuda-toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "12.8.0"
          method: network
          sub-packages: '["nvcc"]'

      - name: Show nvcc version
        run: nvcc -V

      - name: Install build tooling
        run: >
          python -m pip install --upgrade pip "setuptools>=69" wheel build

      - name: Install PyTorch CUDA wheel
        run: >
          python -m pip install --upgrade
          "torch==${TORCH_VERSION}"

      - name: Install CuTe AOT build dependencies
        run: >
          python -m pip install --upgrade
          "nvidia-cutlass-dsl==4.4.2"
          "cuda-python==12.9.4"
          "apache-tvm-ffi==0.1.9"

      - name: Clean AOT payload output
        run: rm -rf /tmp/slinoss-cute-aot

      - name: Build CUDA default CuTe AOT payload
        env:
          CUDA_HOME: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}
          TORCH_CUDA_ARCH_LIST: "7.0;8.0;8.6;8.9;9.0"
          SLINOSS_CUTE_AOT_ARCH_TAGS: "8.0;8.6;8.9;9.0"
        run: >
          python scripts/build_cute_aot.py
          --package-root /tmp/slinoss-cute-aot

      - name: Verify CUDA default CuTe AOT payload
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          package_root = Path("/tmp/slinoss-cute-aot")
          expected = {
              "v2x2ssd": {"v2x2ssd_fwd", "v2x2ssd_bwd"},
              "scanprep": {"scanprep_fwd", "scanprep_bwd"},
          }
          for name, expected_kinds in expected.items():
              payload_root = package_root / name
              manifest = json.loads((payload_root / "manifest.json").read_text())
              if not (payload_root / "artifacts").is_dir():
                  raise SystemExit(f"Missing CuTe AOT artifacts directory for {name}")
              if not (payload_root / "runtime").is_dir():
                  raise SystemExit(f"Missing CuTe AOT runtime directory for {name}")
              packaged_kinds = {
                  str(record.get("kind"))
                  for record in manifest.get("artifacts", [])
              }
              if packaged_kinds != expected_kinds:
                  raise SystemExit(
                      f"Expected packaged kinds {sorted(expected_kinds)} for {name}, "
                      f"found {sorted(packaged_kinds)}"
                  )
              if not manifest.get("artifacts"):
                  raise SystemExit(f"Expected packaged CuTe AOT artifacts for {name}")
          PY

      - name: Upload CUDA AOT payload
        uses: actions/upload-artifact@v4
        with:
          name: slinoss-cute-aot
          path: /tmp/slinoss-cute-aot

  build_cuda:
    if: github.event_name != 'pull_request'
    needs:
      - build_cuda_aot_payload
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Read package metadata
        id: meta
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          print(f"version={data['project']['version']}")
          PY

      - name: Ensure tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: test "${GITHUB_REF_NAME}" = "v${{ steps.meta.outputs.version }}"

      - name: Install CUDA toolkit
        id: cuda-toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "12.8.0"
          method: network
          sub-packages: '["nvcc"]'

      - name: Show nvcc version
        run: nvcc -V

      - name: Install build tooling
        run: >
          python -m pip install --upgrade pip "setuptools>=69" wheel build

      - name: Install PyTorch CUDA wheel
        run: >
          python -m pip install --upgrade
          "torch==${TORCH_VERSION}"

      - name: Install CuTe AOT build dependencies
        run: >
          python -m pip install --upgrade
          "nvidia-cutlass-dsl==4.4.2"
          "cuda-python==12.9.4"
          "apache-tvm-ffi==0.1.9"

      - name: Clean build artifacts
        run: |
          rm -rf build dist *.egg-info
          rm -rf slinoss/ops/v2x2ssd/cute/aot/artifacts
          rm -rf slinoss/ops/v2x2ssd/cute/aot/runtime
          rm -f slinoss/ops/v2x2ssd/cute/aot/manifest.json
          rm -rf slinoss/ops/scanprep/cute/aot/artifacts
          rm -rf slinoss/ops/scanprep/cute/aot/runtime
          rm -f slinoss/ops/scanprep/cute/aot/manifest.json

      - name: Download CUDA AOT payload
        uses: actions/download-artifact@v4
        with:
          name: slinoss-cute-aot
          path: /tmp/slinoss-cute-aot

      - name: Build CUDA wheel
        env:
          CUDA_HOME: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}
          TORCH_CUDA_ARCH_LIST: "7.0;8.0;8.6;8.9;9.0"
          SLINOSS_CUTE_AOT_PAYLOAD_DIR: "/tmp/slinoss-cute-aot"
        run: python -m build --wheel --no-isolation

      - name: Capture CUDA wheel name
        id: wheel
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path

          wheels = [
              wheel.name
              for wheel in Path("dist").glob("slinoss-*.whl")
              if "py3-none-any" not in wheel.name
          ]
          if len(wheels) != 1:
              raise SystemExit(f"Expected one CUDA wheel, found: {wheels}")
          print(f"wheel_name={wheels[0]}")
          PY

      - name: Verify CUDA wheel contents
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import zipfile

          wheel = Path("dist/${{ steps.wheel.outputs.wheel_name }}")
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())
              v2_manifest = json.loads(
                  zf.read("slinoss/ops/v2x2ssd/cute/aot/manifest.json").decode("utf-8")
              )
              scanprep_manifest = json.loads(
                  zf.read("slinoss/ops/scanprep/cute/aot/manifest.json").decode("utf-8")
              )

          required = "slinoss/_C/__init__.py"
          if required not in names:
              raise SystemExit(f"Missing {required} in {wheel.name}")

          aot_manifest = "slinoss/ops/v2x2ssd/cute/aot/manifest.json"
          if aot_manifest not in names:
              raise SystemExit(f"Missing {aot_manifest} in {wheel.name}")
          scanprep_aot_manifest = "slinoss/ops/scanprep/cute/aot/manifest.json"
          if scanprep_aot_manifest not in names:
              raise SystemExit(f"Missing {scanprep_aot_manifest} in {wheel.name}")

          extension_members = [
              name
              for name in names
              if name.startswith("slinoss/_C/cconv1d_cuda")
          ]
          if len(extension_members) != 1:
              raise SystemExit(
                  f"Expected one packaged cconv1d extension in {wheel.name}, "
                  f"found {extension_members}"
              )
          print("cuda-wheel-extension", extension_members[0])

          v2_aot_members = [
              name
              for name in names
              if name.startswith("slinoss/ops/v2x2ssd/cute/aot/artifacts/")
              and name.endswith(".so")
          ]
          scanprep_aot_members = [
              name
              for name in names
              if name.startswith("slinoss/ops/scanprep/cute/aot/artifacts/")
              and name.endswith(".so")
          ]
          aot_object_members = [
              name
              for name in names
              if (
                  name.startswith("slinoss/ops/v2x2ssd/cute/aot/artifacts/")
                  or name.startswith("slinoss/ops/scanprep/cute/aot/artifacts/")
              )
              and name.endswith(".o")
          ]
          if not v2_aot_members:
              raise SystemExit(f"Expected packaged v2x2ssd AOT shared libraries in {wheel.name}")
          if not scanprep_aot_members:
              raise SystemExit(f"Expected packaged scanprep AOT shared libraries in {wheel.name}")
          v2_packaged_kinds = {
              str(record.get("kind"))
              for record in v2_manifest.get("artifacts", [])
          }
          if v2_packaged_kinds != {"v2x2ssd_fwd", "v2x2ssd_bwd"}:
              raise SystemExit(
                  f"Expected packaged v2x2ssd defaults in {wheel.name}, "
                  f"found {sorted(v2_packaged_kinds)}"
              )
          scanprep_packaged_kinds = {
              str(record.get("kind"))
              for record in scanprep_manifest.get("artifacts", [])
          }
          if scanprep_packaged_kinds != {"scanprep_fwd", "scanprep_bwd"}:
              raise SystemExit(
                  f"Expected packaged scanprep defaults in {wheel.name}, "
                  f"found {sorted(scanprep_packaged_kinds)}"
              )
          if aot_object_members:
              raise SystemExit(
                  f"Did not expect packaged CuTe AOT object files in {wheel.name}: "
                  f"{aot_object_members}"
              )
          runtime_members = [
              name
              for name in names
              if (
                  name.startswith("slinoss/ops/v2x2ssd/cute/aot/runtime/")
                  or name.startswith("slinoss/ops/scanprep/cute/aot/runtime/")
              )
              and name.endswith(".so")
          ]
          if len(runtime_members) < 2:
              raise SystemExit(
                  f"Expected packaged CuTe/TVM runtime libs in {wheel.name}, "
                  f"found {runtime_members}"
              )
          print("cuda-wheel-aot-count", len(v2_aot_members) + len(scanprep_aot_members))
          PY

      - name: Smoke install CUDA wheel
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m venv /tmp/slinoss-cuda-wheel-smoke
          WHEEL_URL="file://${GITHUB_WORKSPACE}/dist/${{ steps.wheel.outputs.wheel_name }}"
          /tmp/slinoss-cuda-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/slinoss-cuda-wheel-smoke/bin/python -m pip install "slinoss[cuda] @ ${WHEEL_URL}"
          cd /tmp
          /tmp/slinoss-cuda-wheel-smoke/bin/python - <<'PY'
          import torch
          import cutlass  # noqa: F401
          import cuda  # noqa: F401
          import slinoss
          from slinoss.ops.v2x2ssd.cute.aot import (
              list_packaged_backward_aot_specs,
              list_packaged_forward_aot_specs,
          )
          from slinoss.layers import SLinOSSMixer
          from slinoss.ops.cconv1d import cconv1d_is_available, cconv1d_load_error

          print("slinoss_import", slinoss.__file__)
          assert cconv1d_is_available(), cconv1d_load_error()
          assert list_packaged_forward_aot_specs(), "expected packaged forward AOT specs"
          assert list_packaged_backward_aot_specs(), "expected packaged backward AOT specs"
          mixer = SLinOSSMixer(
              d_model=32,
              d_state=32,
              expand=2,
              d_head=16,
              d_conv=4,
          )
          print("cuda-wheel-smoke-ok", type(mixer).__name__)
          PY

      - name: Upload CUDA wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: slinoss-cuda-wheel-${{ steps.meta.outputs.version }}-${{ matrix.python-version }}
          path: dist/${{ steps.wheel.outputs.wheel_name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build_pure
      - build_cuda
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download universal wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: slinoss-pure-wheel-${{ needs.build_pure.outputs.version }}
          path: dist

      - name: Download CUDA wheel artifact
        uses: actions/download-artifact@v4
        with:
          pattern: slinoss-cuda-wheel-${{ needs.build_pure.outputs.version }}-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
